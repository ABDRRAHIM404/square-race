name: Build Android Debug APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Verify Node.js version
        run: |
          node --version
          npm --version
          which node
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major < 22) { throw new Error(`Node 22+ required, got ${process.version}`); }"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm ci

      - name: Add Android platform
        run: npx cap add android

      - name: Verify Android SDK versions
        run: |
          grep -q "minSdkVersion = 24" android/variables.gradle
          grep -q "compileSdkVersion = 36" android/variables.gradle
          grep -q "targetSdkVersion = 36" android/variables.gradle

      - name: Sync Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: maze-runners-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
